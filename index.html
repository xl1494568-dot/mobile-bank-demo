<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手机银行   Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #647184;
      --line: #dde6f0;
      --blue: #1f66d1;
      --cyan: #12a8c7;
      --green: #17a36b;
      --amber: #d68614;
      --rose: #df3f61;
      --paper: #ffffff;
      --mist: #f4f7fb;
      --shadow: 0 18px 48px rgba(21, 35, 55, 0.14);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(18, 168, 199, 0.18), transparent 30rem),
        radial-gradient(circle at 88% 0%, rgba(31, 102, 209, 0.14), transparent 28rem),
        linear-gradient(140deg, #f8fbff 0%, #edf4f9 48%, #f7f9fc 100%);
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .stage {
      display: grid;
      min-height: 100svh;
      place-items: center;
      padding: 12px;
    }

    .phone {
      position: relative;
      width: min(100%, 430px);
      min-height: min(860px, calc(100svh - 24px));
      max-height: 920px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 34px;
      background: #f7f9fc;
      box-shadow: var(--shadow);
    }

    .notch {
      position: absolute;
      z-index: 4;
      top: 8px;
      left: 50%;
      width: 132px;
      height: 25px;
      border-radius: 0 0 18px 18px;
      transform: translateX(-50%);
      background: #101827;
    }

    .screen {
      display: flex;
      min-height: inherit;
      max-height: inherit;
      flex-direction: column;
    }

    .top {
      padding: 14px 20px 0;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
    }

    .signals {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #223049;
    }

    .signal-bars {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 15px;
    }

    .signal-bars i {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: currentColor;
    }

    .signal-bars i:nth-child(1) { height: 5px; }
    .signal-bars i:nth-child(2) { height: 8px; }
    .signal-bars i:nth-child(3) { height: 11px; }
    .signal-bars i:nth-child(4) { height: 14px; }

    .battery {
      width: 28px;
      height: 14px;
      padding: 2px;
      border: 1.5px solid currentColor;
      border-radius: 4px;
    }

    .battery::after {
      content: "";
      display: block;
      width: 20px;
      height: 8px;
      border-radius: 2px;
      background: var(--green);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border-radius: 16px;
      color: white;
      background: linear-gradient(145deg, #194fb7, #0fa5bf);
      box-shadow: 0 12px 22px rgba(31, 102, 209, 0.24);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .icon-button {
      position: relative;
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 16px;
      color: #2b3852;
      background: white;
      box-shadow: 0 10px 24px rgba(21, 35, 55, 0.08);
    }

    .dot {
      position: absolute;
      top: 10px;
      right: 11px;
      width: 8px;
      height: 8px;
      border: 2px solid white;
      border-radius: 999px;
      background: var(--rose);
    }

    .content {
      flex: 1;
      margin-top: 18px;
      overflow-y: auto;
      padding: 0 20px 22px;
    }

    .content::-webkit-scrollbar {
      width: 0;
    }

    .card {
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 0 10px 28px rgba(21, 35, 55, 0.07);
    }

    .card-body {
      padding: 18px;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .profile-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      display: grid;
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 17px;
      color: var(--blue);
      background: #eef4ff;
      font-size: 20px;
      font-weight: 800;
    }

    .profile strong,
    .section-title {
      display: block;
      margin: 0;
      color: #111a2e;
      font-size: 16px;
      font-weight: 800;
    }

    .profile span,
    .small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 10px;
      color: #08754d;
      background: #eaf8f2;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .balance {
      margin-top: 18px;
      padding: 18px;
      border-radius: 21px;
      color: white;
      background:
        linear-gradient(135deg, rgba(18, 168, 199, 0.18), transparent 45%),
        linear-gradient(145deg, #101827, #143b85 58%, #1f66d1);
    }

    .balance-head,
    .card-head,
    .todo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .balance-label {
      color: #cfe2ff;
      font-size: 13px;
    }

    .ghost {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      color: #d8e7ff;
      background: rgba(255, 255, 255, 0.1);
    }

    .amount {
      margin: 10px 0 0;
      min-height: 42px;
      font-size: 33px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .assets {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
      color: #cfe2ff;
      font-size: 12px;
    }

    .assets strong {
      display: block;
      margin-bottom: 3px;
      color: white;
      font-size: 13px;
      font-weight: 800;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      color: #9b5a05;
      background: #fff5df;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .todo {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: var(--mist);
    }

    .todo-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mini-icon {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 15px;
      color: var(--blue);
      background: #eaf2ff;
    }

    .todo-title {
      overflow: hidden;
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .todo-desc {
      overflow: hidden;
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .primary {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      background: var(--blue);
      box-shadow: 0 10px 18px rgba(31, 102, 209, 0.22);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .news-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .news-item {
      width: 100%;
      padding: 14px;
      border: 1px solid #edf2f7;
      border-radius: 18px;
      color: inherit;
      background: var(--mist);
      text-align: left;
    }

    .news-item strong {
      display: block;
      color: #111a2e;
      font-size: 14px;
      line-height: 1.4;
    }

    .news-item span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .assistant-card {
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(145deg, #eef7ff, #effbf8);
    }

    .assistant-message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .assistant-avatar {
      display: grid;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 14px;
      color: white;
      background: var(--blue);
    }

    #aiMessage {
      margin: 0;
      min-height: 60px;
      color: #33415d;
      font-size: 14px;
      line-height: 1.7;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border-radius: 999px;
      padding: 9px 12px;
      color: #34415a;
      background: #eef2f7;
      font-size: 12px;
      font-weight: 800;
    }

    .pressable {
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .pressable:active {
      transform: scale(0.97);
    }

    .fade {
      animation: fade 0.28s ease both;
    }

    .pop {
      animation: pop 0.38s cubic-bezier(0.2, 1.4, 0.4, 1) both;
    }

    .typing::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1em;
      margin-left: 2px;
      vertical-align: -2px;
      background: var(--blue);
      animation: blink 0.78s steps(1) infinite;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: end;
      justify-content: center;
      padding: 16px;
      pointer-events: none;
      background: rgba(15, 24, 39, 0);
      opacity: 0;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .modal.open {
      pointer-events: auto;
      background: rgba(15, 24, 39, 0.42);
      opacity: 1;
    }

    .sheet {
      width: min(100%, 430px);
      padding: 20px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 20px 50px rgba(15, 24, 39, 0.24);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.2s ease;
    }

    .modal.open .sheet {
      transform: translateY(0) scale(1);
    }

    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .sheet-kicker {
      margin: 0;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
    }

    .sheet-title {
      margin: 4px 0 0;
      color: #111a2e;
      font-size: 18px;
      line-height: 1.35;
    }

    .sheet-body {
      margin: 0;
      color: #526078;
      font-size: 14px;
      line-height: 1.8;
    }

    @media (min-width: 640px) {
      .modal {
        align-items: center;
      }
    }

    @media (max-width: 380px) {
      .top,
      .content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .amount {
        font-size: 29px;
      }

      .primary {
        padding-inline: 12px;
      }
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: scale(0.6); }
      70% { opacity: 1; transform: scale(1.12); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="手机银行 Demo">
      <div class="notch" aria-hidden="true"></div>
      <div class="screen">
        <header class="top">
          <div class="status">
            <span id="statusTime">14:28</span>
            <div class="signals" aria-hidden="true">
              <span class="signal-bars"><i></i><i></i><i></i><i></i></span>
              <span>5G</span>
              <span class="battery"></span>
            </div>
          </div>

          <div class="brand-row">
            <div class="brand">
              <div class="mark" aria-hidden="true">
                <svg width="25" height="25" viewBox="0 0 24 24" fill="none">
                  <path d="M4 10.1 12 5l8 5.1v1.5H4v-1.5Z" fill="currentColor"/>
                  <path d="M6 13h2v5H6v-5Zm5 0h2v5h-2v-5Zm5 0h2v5h-2v-5ZM4.8 19h14.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <div>
                <h1>睿安银行</h1>
                <p>安全资产管家</p>
              </div>
            </div>
            <button class="icon-button pressable" aria-label="消息通知">
              <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13.7 19a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              <span class="dot" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <div class="content">
          <section class="card">
            <div class="card-body">
              <div class="profile">
                <div class="profile-main">
                  <div class="avatar">张</div>
                  <div>
                    <strong>张先生，下午好</strong>
                    <span>财富等级：铂金客户</span>
                  </div>
                </div>
                <span class="pill">已守护</span>
              </div>

              <div class="balance">
                <div class="balance-head">
                  <span class="balance-label">总资产</span>
                  <button id="toggleBalance" class="ghost pressable" aria-label="显示或隐藏总资产">
                    <svg id="eyeOpen" width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <svg id="eyeClosed" style="display:none" width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="m3 3 18 18M10.7 5.7c.4-.1.8-.2 1.3-.2 6 0 9.5 6.5 9.5 6.5a16 16 0 0 1-2.6 3.4M6.6 6.7A16.2 16.2 0 0 0 2.5 12S6 18.5 12 18.5c1.6 0 3-.4 4.2-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>
                <p id="balanceAmount" class="amount">****</p>
                <div class="assets">
                  <div><strong>¥86,420</strong>活期</div>
                  <div><strong>¥520,000</strong>定期</div>
                  <div><strong>¥628,147</strong>理财</div>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-body">
              <div class="card-head">
                <h2 class="section-title">今日待办事项</h2>
                <span id="todoBadge" class="badge">1 项待处理</span>
              </div>
              <div class="todo">
                <div class="todo-main">
                  <div id="todoIcon" class="mini-icon">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M4 7h16M6 7V5.5A1.5 1.5 0 0 1 7.5 4h9A1.5 1.5 0 0 1 18 5.5V7m-1 4H7m8 4H7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                  </div>
                  <div>
                    <p id="todoTitle" class="todo-title">今日支出汇总确认</p>
                    <p id="todoDesc" class="todo-desc">共 8 笔支出，合计 ¥1,286.50</p>
                  </div>
                </div>
                <button id="confirmTodo" class="primary pressable">一键确认</button>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-body">
              <div class="card-head">
                <h2 class="section-title">今日金融资讯</h2>
                <span class="small">精选</span>
              </div>
              <div class="news-list">
                <button class="news-item pressable" data-news="0">
                  <strong>公开市场操作延续稳健取向</strong>
                  <span>流动性保持合理充裕，短端利率预计平稳运行。</span>
                </button>
                <button class="news-item pressable" data-news="1">
                  <strong>低波理财产品配置热度上升</strong>
                  <span>稳健型客户更关注回撤控制与现金流安排。</span>
                </button>
                <button class="news-item pressable" data-news="2">
                  <strong>人民币汇率双向波动增强</strong>
                  <span>跨境消费与留学家庭可分批锁定换汇计划。</span>
                </button>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card-body">
              <div class="card-head">
                <h2 class="section-title">AI 对话助手</h2>
                <span class="pill">智能推荐</span>
              </div>
              <div class="assistant-card" style="margin-top:14px">
                <div class="assistant-message">
                  <div class="assistant-avatar" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                      <path d="M12 3v3m6.4.6-2.1 2.1M21 13h-3M5.6 6.6l2.1 2.1M3 13h3m2 8h8a3 3 0 0 0 3-3v-4a5 5 0 0 0-5-5h-4a5 5 0 0 0-5 5v4a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M9 15h.01M15 15h.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
                    </svg>
                  </div>
                  <p id="aiMessage">我是您的财富助手，今天有什么可以帮您？</p>
                </div>
              </div>
              <div class="chips">
                <button class="chip pressable" data-reply="上月餐饮与出行支出占比提升。建议先设置 ¥8,000 的月度弹性预算，并把高频小额消费归入自动分类，月底复盘会更清晰。">分析上月账单</button>
                <button class="chip pressable" data-reply="当前可关注中低风险固收产品。建议把可投资资金分成三笔，保留 20% 流动资金，其余按期限梯度配置。">查看稳健理财</button>
                <button class="chip pressable" data-reply="您本月仍有 5 次跨行免手续费额度。若是常用收款人，可以建立快捷转账模板并开启到账提醒。">跨行转账额度</button>
              </div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <article class="sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="sheet-head">
        <div>
          <p class="sheet-kicker">睿安精选资讯</p>
          <h3 id="modalTitle" class="sheet-title"></h3>
        </div>
        <button id="closeModal" class="icon-button pressable" aria-label="关闭资讯弹窗">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <p id="modalBody" class="sheet-body"></p>
    </article>
  </div>

  <script>
    const balanceButton = document.getElementById("toggleBalance");
    const balanceAmount = document.getElementById("balanceAmount");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");
    let balanceVisible = false;

    balanceButton.addEventListener("click", () => {
      balanceVisible = !balanceVisible;
      balanceAmount.textContent = balanceVisible ? "¥1,234,567.89" : "****";
      balanceAmount.classList.remove("fade");
      void balanceAmount.offsetWidth;
      balanceAmount.classList.add("fade");
      eyeOpen.style.display = balanceVisible ? "block" : "none";
      eyeClosed.style.display = balanceVisible ? "none" : "block";
    });

    const confirmButton = document.getElementById("confirmTodo");
    const todoBadge = document.getElementById("todoBadge");
    const todoIcon = document.getElementById("todoIcon");
    const todoTitle = document.getElementById("todoTitle");
    const todoDesc = document.getElementById("todoDesc");

    confirmButton.addEventListener("click", () => {
      confirmButton.disabled = true;
      confirmButton.textContent = "已确认";
      confirmButton.style.background = "var(--green)";
      confirmButton.style.boxShadow = "0 10px 18px rgba(23, 163, 107, 0.22)";
      todoBadge.textContent = "今日无待办";
      todoBadge.style.color = "#08754d";
      todoBadge.style.background = "#eaf8f2";
      todoIcon.className = "mini-icon pop";
      todoIcon.style.color = "var(--green)";
      todoIcon.style.background = "#eaf8f2";
      todoIcon.innerHTML = '<svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 4 4L19 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      todoTitle.textContent = "今日支出已确认";
      todoDesc.textContent = "资产状态已同步更新";
    });

    const news = [
      {
        title: "公开市场操作延续稳健取向",
        body: "今日公开市场操作继续强调灵活适度与精准有效。对普通投资者而言，短期资金面保持平稳有助于降低现金管理产品的收益波动，建议关注产品久期、赎回规则与自身流动性需求。"
      },
      {
        title: "低波理财产品配置热度上升",
        body: "近期稳健型理财产品更受关注，主要原因是投资者对回撤控制的要求提升。配置时可优先比较历史净值波动、持仓资产透明度与费用结构，避免只看近七日年化收益。"
      },
      {
        title: "人民币汇率双向波动增强",
        body: "汇率双向波动可能影响跨境消费、留学缴费与海外资产配置。对于已有明确外币支出的家庭，可以考虑分批换汇，降低一次性操作带来的价格波动风险。"
      }
    ];

    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");

    function openModal(index) {
      modalTitle.textContent = news[index].title;
      modalBody.textContent = news[index].body;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    document.querySelectorAll(".news-item").forEach((item) => {
      item.addEventListener("click", () => openModal(Number(item.dataset.news)));
    });

    document.getElementById("closeModal").addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    const aiMessage = document.getElementById("aiMessage");
    let typingTimer;

    function typeReply(text) {
      clearInterval(typingTimer);
      aiMessage.textContent = "";
      aiMessage.classList.add("typing");
      let index = 0;
      typingTimer = setInterval(() => {
        aiMessage.textContent += text[index] || "";
        index += 1;
        if (index > text.length) {
          clearInterval(typingTimer);
          aiMessage.classList.remove("typing");
        }
      }, 24);
    }

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => typeReply(chip.dataset.reply));
    });

    function updateTime() {
      const now = new Date();
      document.getElementById("statusTime").textContent = now.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    updateTime();
    setInterval(updateTime, 30000);
  </script>
</body>
</html>
